name: X86-64

permissions: write-all
#开启写权限，防止无法上传到release

run-name: "x86-64 ${{ inputs.debug_or_make_config }} ${{ inputs.cpolar_token_type }} wujinjun|others|larger|busybox:${{ inputs.use_wujinjun }}|${{ inputs.use_others }}|${{ inputs.use_larger }}|${{ inputs.use_busybox }} single_thread:${{ inputs.force_single_thread }} ccache:${{ inputs.use_ccache }} sccache:${{ inputs.use_sccache }}"

on:
  # repository_dispatch:
  workflow_dispatch:
    # 增加交互式开关，方便在启动时选择是否进入调试模式
    inputs:
      debug_or_make_config:
        description: "远程调试 (Cpolar)"
        default: "mkconf"
        type: choice
        options:
          - none
          - debug
          - mkconf
      menuconfig_color:
        description: 'make menuconfig 配色。默认 bluetitle (蓝白配色)，可选 blackbg (夜间模式)'
        required: true
        default: 'bluetitle'
        type: choice
        options:
          - mono
          - blackbg
          - classic
          - bluetitle
      cpolar_token_type:
        description: '选择使用的 Cpolar Token'
        required: true
        default: 'TOKEN_1'
        type: choice
        options:
          - TOKEN_1
          - TOKEN_2
          - TOKEN_3
      make_thread:
        description: '线程数 设置为0表示 CPU核心数*2+1'
        required: true
        default: '0'
      force_single_thread:
        description: "强制单线程编译"
        default: false
        type: boolean
      use_ccache:
        description: "使用 ccache 加速编译"
        default: true
        type: boolean
      use_sccache:
        description: "使用 sccache (Rust ccache) 加速编译"
        default: true
        type: boolean
      use_wujinjun:
        description: "使用 wujinjun 的软件包"
        default: true
        type: boolean
      use_others:
        description: "使用 wujinjun 的其他软件包 (Others-)"
        default: true
        type: boolean
      use_larger:
        description: "使用 wujinjun 的更多软件包 (-larger)"
        default: false
        type: boolean
      use_busybox:
        description: "使用 wujinjun 的 Busybox 特调 (谨慎使用) (-busybox)"
        default: false
        type: boolean
      fix_version_invalid:
        description: "自动修复插件版本号不合法 (PKG_VERSION and PKG_RELEASE)"
        default: true
        type: boolean
      show_disk_free:
        description: "在编译日志中每隔一段时间添加剩余空间显示 (只显示根目录剩余 `df -h /`) (只显示到 actions 输出)"
        default: true
        type: boolean
  # schedule:
  #  - cron: 0 20 * * 4
  #  #      分,时,日,月,周。每周五 20时执行一次 (UTC时间)
  
env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  FREE_DISK_SH: scripts/free_disk_space.sh
  ENV_SH: scripts/environment.sh
  REPO_URL_BUILDER: https://github.com/wujinjun-MC/Actions-immortalwrt
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  # 修改 REPO_BRANCH 来达到更改编译版本
  #REPO_BRANCH: openwrt-25.12
  REPO_BRANCH: master
  PLATFORM_FILE: configs/Target-X86.txt
  CONFIG_FILE: configs/Packages.txt
  CONFIG_5G: configs/Packages-5G.txt
  CONFIG_WUJINJUN: configs/Packages-wujinjun.txt
  CONFIG_WUJINJUN_LARGER: configs/Packages-wujinjun-larger.txt
  CONFIG_WUJINJUN_BUSYBOX: configs/Packages-wujinjun-busybox.txt
  CONFIG_WUJINJUN_OTHERS: configs/Others-wujinjun.txt
  SETTINGS_SH: scripts/init-settings.sh
  PACKAGES_SH: scripts/packages.sh
  INSTALL5G_SH: scripts/install-5G.sh
  CLASH_CORE_SH: scripts/preset-clash-core-amd64.sh
  RUST_SH: scripts/rust.sh
  CUSTOM_SH: scripts/custom-wujinjun-1.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  COMBINE_DISKS: false
  # --- 注入 Cpolar 所需的环境变量 ---
  MY_SSH_PUB_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
  CPOLAR_TOKEN_1: ${{ secrets.CPOLAR_TOKEN_1 }}
  CPOLAR_TOKEN_2: ${{ secrets.CPOLAR_TOKEN_2 }}
  CPOLAR_TOKEN_3: ${{ secrets.CPOLAR_TOKEN_3 }}
  # Workflow dispatch 变量
  ## 需要使用 !contains(inputs.xxx, 'true/false') 判断布尔值，以避免一直 true。
  ### https://stackoverflow.com/questions/72539900/schedule-trigger-github-action-workflow-with-input-parameters
  CPOLAR: ${{ inputs.debug_or_make_config || 'none' }}
  MENUCONFIG_COLOR: ${{ inputs.menuconfig_color || 'bluetitle' }}
  CPOLAR_TOKEN_TYPE: ${{ inputs.cpolar_token_type || 'TOKEN_1' }}
  MAKE_THREAD: ${{ inputs.make_thread || '0' }}
  FORCE_SINGLE_THREAD: ${{ inputs.force_single_thread || 'false' }}
  USE_CCACHE: |-
    ${{ case(
      github.event_name == 'workflow_dispatch', inputs.use_ccache,
      'true'
    ) }}
  USE_SCCACHE: |-
    ${{ case(
      github.event_name == 'workflow_dispatch', inputs.use_sccache,
      'true'
    ) }}
  USE_WUJINJUN: |-
    ${{ case(
      github.event_name == 'workflow_dispatch', inputs.use_wujinjun,
      'true'
    ) }}
  USE_OTHERS: |-
    ${{ case(
      github.event_name == 'workflow_dispatch', inputs.use_others,
      'true'
    ) }}
  USE_LARGER: ${{ inputs.use_larger || 'false' }}
  USE_BUSYBOX: ${{ inputs.use_busybox || 'false' }}
  FIX_VERSION_INVALID: |-
    ${{ case(
      github.event_name == 'workflow_dispatch', inputs.fix_version_invalid,
      'true'
    ) }}
  SHOW_DISK_FREE: ${{ inputs.show_disk_free || 'false' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Record Startup Timestamp(记录启动时间戳)
      run: |
        sudo timedatectl set-timezone "$TZ"
        printf "TIMESTAMP_START=%(%s)T" >> $GITHUB_ENV

    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: 检查代码
      uses: actions/checkout@main

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        bash $FREE_DISK_SH
        sudo -E apt-get -qq update -y
        sudo -E apt-get -qq full-upgrade -y
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt -yqq install dos2unix libfuse-dev ccache sccache mkisofs ncdu btop colorized-logs expect safe-rm 
        chmod +x $ENV_SH && $ENV_SH
        sudo rm -rf /var/lib/apt/lists/*
        sudo -E apt -yqq autoremove --purge
        sudo -E apt -yqq autoclean
        sudo -E apt -yqq clean
        sudo -E systemctl daemon-reload
        # 设置时区
        sudo timedatectl set-timezone "$TZ"
        

    - name: Combine Disks(合并磁盘)
      if: env.COMBINE_DISKS == 'true'
      uses: easimon/maximize-build-space@master
      with:
        build-mount-path: /workdir
        swap-size-mb: 1024
        temp-reserve-mb: 100
        root-reserve-mb: 1024
        remove-dotnet: true
        remove-android: true
        remove-haskell: true
        remove-codeql: true
        remove-docker-images: true

    # 1. 如果选择了 debug 模式，先启动隧道（非阻塞模式）
    - name: Remote debug (Startup)
      if: env.CPOLAR == 'debug'
      shell: bash
      run: |
        cp "$GITHUB_WORKSPACE/bash_history" ~/.bash_history
        echo >> ~/.bash_profile
        cat "$GITHUB_WORKSPACE/.bash_profile" >> ~/.bash_profile
        cat "$GITHUB_WORKSPACE/.tmux.conf" >> ~/.tmux.conf
        cat "$GITHUB_WORKSPACE/.tmux.switch-client.sh" >> ~/.tmux.switch-client.sh && chmod 755 ~/.tmux.switch-client.sh
        bash ${GITHUB_WORKSPACE}/debug-via-reverse-proxy.sh nonblock

    - name: 检查空间使用情况（清理情况）
      if: (!cancelled())
      run: df -hT

    - name: 设置 /workdir
      run: |
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 记录所有编译步骤启动前的存储占用
      run: |
        echo "DISK_USAGE_BEFORE_ALL_HUMAN=$(df -h /workdir | tail -n 1 |  awk '{print $3}')" >> $GITHUB_ENV
        echo "DISK_USAGE_BEFORE_ALL_ORIGIN=$(df /workdir | tail -n 1 |  awk '{print $3}')" >> $GITHUB_ENV

    - name: 克隆源码
      working-directory: /workdir
      run: |
        git clone $REPO_URL --depth 1 -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

        cd ./openwrt/ && echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV

        # GitHub Action 移除国内下载源
        PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
        if [ -f "$PROJECT_MIRRORS_FILE" ]; then
          sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
        fi

    - name: Generate Release Tag (生成日期Tag)
      run: |
        # 生成格式为 2024.05.20-1530 的时间戳
        RELEASE_TAG="X86_64-$(date +%Y.%m.%d-%H%M)-${{ github.run_id }}"
        echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
        echo "FIRMWARE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

    - name: Generate Variables(生成变量)
      run: |
        # 确定线程数
        if [ $MAKE_THREAD = 0 ]; then
          echo "MAKE_THREAD=$(( $(nproc) * 2 + 1 ))" >> $GITHUB_ENV
        fi

        cp $PLATFORM_FILE $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
        # 提取 Commit 信息
        echo "COMMIT_HASH=$(cd $OPENWRT_PATH && git rev-parse HEAD)" >> $GITHUB_ENV
        echo "SHORT_COMMIT=$(cd $OPENWRT_PATH && git rev-parse --short HEAD)" >> $GITHUB_ENV
        echo "COMMIT_HASH_BUILDER=$(cd $GITHUB_WORKSPACE && git rev-parse HEAD)" >> $GITHUB_ENV
        echo "SHORT_COMMIT_BUILDER=$(cd $GITHUB_WORKSPACE && git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: 检查缓存 (恢复)
      id: check-cache-restore
      uses: actions/cache/restore@v5
      with:
        key: x86-${{env.REPO_BRANCH}}-${{env.WRT_HASH}}
        #restore-keys: x86-${{env.REPO_BRANCH}}
        path: |
          ./openwrt/.ccache
          ./openwrt/.sccache
          ./openwrt/dl
          ./openwrt/staging_dir/host*
          ./openwrt/staging_dir/tool*

    - name: 更新缓存
      run: |
        if [ -d "./openwrt/staging_dir" ]; then
          find "./openwrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
            find "$DIR" -type f -exec touch {} +
          done

          mkdir -p ./openwrt/tmp && echo "1" > ./openwrt/tmp/.build

          echo "toolchain skiped done!"
        else
          echo "caches missed!"
        fi

    - name: 安装 feeds
      run: |
        cd $OPENWRT_PATH

        # 更换顺序， jell 现在在 small-package 之前，优先级更高，没有测试
        # 添加 jell https://github.com/kenzok8/jell
        echo >> feeds.conf.default
        sed -i '$a src-git jell https://github.com/kenzok8/jell' feeds.conf.default

        # 添加 small-package https://github.com/kenzok8/small-package
        echo >> feeds.conf.default
        sed -i '$a src-git smpackage https://github.com/kenzok8/small-package' feeds.conf.default

        # 添加 istoreos 界面 https://github.com/linkease/nas-packages-luci
        echo >> feeds.conf.default
        echo 'src-git nas https://github.com/linkease/nas-packages.git;master' >> feeds.conf.default
        echo 'src-git nas_luci https://github.com/linkease/nas-packages-luci.git;main' >> feeds.conf.default
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 导入补丁和配置 & 执行脚本
      run: |
        [ -d files ] && mv files openwrt/files || echo "files not found"
        [ -f $PLATFORM_FILE ] && cat $PLATFORM_FILE >> openwrt/.config
        [ -f $CONFIG_FILE ] && cat $CONFIG_FILE >> openwrt/.config
        #[ -f $CONFIG_5G ] && cat $CONFIG_5G >> openwrt/.config
        if [ "$USE_WUJINJUN"x = "true"x ]; then
          echo "USE_WUJINJUN = true, add $CONFIG_WUJINJUN"
          [ -f $CONFIG_WUJINJUN ] && cat $CONFIG_WUJINJUN >> openwrt/.config
        fi
        if [ "$USE_OTHERS"x = "true"x ]; then
          echo "USE_OTHERS = true, add $CONFIG_WUJINJUN_OTHERS"
          [ -f $CONFIG_WUJINJUN_OTHERS ] && cat $CONFIG_WUJINJUN_OTHERS >> openwrt/.config
        fi
        if [ "$USE_LARGER"x = "true"x ]; then
          echo "USE_LARGER = true, add $CONFIG_WUJINJUN_LARGER"
          [ -f $CONFIG_WUJINJUN_LARGER ] && cat $CONFIG_WUJINJUN_LARGER >> openwrt/.config
        fi
        if [ "$USE_BUSYBOX"x = "true"x ]; then
          echo "USE_BUSYBOX = true, add $CONFIG_WUJINJUN_BUSYBOX"
          [ -f $CONFIG_WUJINJUN_BUSYBOX ] && cat $CONFIG_WUJINJUN_BUSYBOX >> openwrt/.config
        fi
        chmod +x $RUST_SH && $RUST_SH
        cd openwrt
        chmod +x $GITHUB_WORKSPACE/$SETTINGS_SH && $GITHUB_WORKSPACE/$SETTINGS_SH
        chmod +x $GITHUB_WORKSPACE/$PACKAGES_SH && $GITHUB_WORKSPACE/$PACKAGES_SH
        chmod +x $GITHUB_WORKSPACE/$INSTALL5G_SH && $GITHUB_WORKSPACE/$INSTALL5G_SH
        chmod +x $GITHUB_WORKSPACE/$CLASH_CORE_SH && $GITHUB_WORKSPACE/$CLASH_CORE_SH
        chmod +x $GITHUB_WORKSPACE/$CUSTOM_SH && $GITHUB_WORKSPACE/$CUSTOM_SH

        echo ".config 创建硬链接到 $OPENWRT_PATH/files/etc/build.config ，在 openwrt 打开 /etc/build.config 即可查看编译时使用的配置"
        ln "$OPENWRT_PATH/.config" "$OPENWRT_PATH/files/etc/build.config"
        
        chmod +x $GITHUB_WORKSPACE/overwrite/overwrite-after-feeds-download.sh
        $GITHUB_WORKSPACE/overwrite/overwrite-after-feeds-download.sh
        chmod +x $GITHUB_WORKSPACE/patch/patch-after-feeds-download.sh
        $GITHUB_WORKSPACE/patch/patch-after-feeds-download.sh

    - name: Place bash history and bash rc (注入bash命令历史记录, rc, tmux.conf, tmux.switch-client.sh)
      if: ${{ env.CPOLAR == 'mkconf' }}
      shell: bash
      run: |
        cp "$GITHUB_WORKSPACE/bash_history" ~/.bash_history
        echo >> ~/.bash_profile
        cat "$GITHUB_WORKSPACE/.bash_profile" >> ~/.bash_profile
        cat "$GITHUB_WORKSPACE/.tmux.conf" >> ~/.tmux.conf
        cat "$GITHUB_WORKSPACE/.tmux.switch-client.sh" >> ~/.tmux.switch-client.sh && chmod 755 ~/.tmux.switch-client.sh

    # 2. 核心步骤：在编译前进入交互式 menuconfig
    - name: Remote make menuconfig (远程改配置)
      if: env.CPOLAR == 'mkconf'
      shell: bash
      run: |
        # 此时 cpolar 会启动并进入阻塞状态，直到你手动删除 /tmp/keep-term
        # 你可以在 SSH 终端里执行 cd $OPENWRT_PATH && make menuconfig
        bash ${GITHUB_WORKSPACE}/debug-via-reverse-proxy.sh

    - name: 下载文件
      run: |
        cd openwrt
        make defconfig
        make download -j8 V=10
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build ccache if needed (在需要时设置ccache)
      run: |
        cd $OPENWRT_PATH

        # 如果设置使用ccache,自动打开
        if [ "$USE_CCACHE"x = "true"x ]; then
          echo "检测到 "'$USE_CCACHE'" = true，正在修改配置以开启ccache"
          #sed -i 's/# CONFIG_CCACHE is not set/CONFIG_CCACHE=y/' .config || sed -i 's/CONFIG_CCACHE=n/CONFIG_CCACHE=y/' .config
          grep -q "CONFIG_CCACHE=y" .config || echo "CONFIG_CCACHE=y" >> .config
        fi

        # 如果设置使用sccache,自动打开
        if [ "$USE_SCCACHE"x = "true"x ]; then
          echo "检测到 "'$USE_SCCACHE'" = true，正在修改配置以开启ccache"
          #sed -i 's/# CONFIG_RUST_SCCACHE is not set/CONFIG_RUST_SCCACHE=y/' .config || sed -i 's/CONFIG_RUST_SCCACHE=n/CONFIG_RUST_SCCACHE=y/' .config
          grep -q "CONFIG_RUST_SCCACHE=y" .config || echo "CONFIG_RUST_SCCACHE=y" >> .config
        fi

        # 检查和构建ccache
        if grep "CONFIG_CCACHE=y" .config; then
          ccache_path=./staging_dir/host/bin/ccache
          if [ -e "$ccache_path" ]; then
            echo "已打开ccache选项，并且工具链已存在，跳过工具链构建"
            mkdir -p "$OPENWRT_PATH/.ccache"
            echo "ENABLED_CCACHE=true" >> $GITHUB_ENV
          else
            echo "已打开ccache选项，但ccache二进制文件没有放入 $ccache_path "
            if ccache_path_system=$(which ccache); then
              echo "系统已安装ccache，正在创建符号链接 \"$ccache_path_system\" -> \"$ccache_path\""
              ln -s "$ccache_path_system" "$ccache_path"
              echo "ENABLED_CCACHE=true" >> $GITHUB_ENV
            else
              echo "系统未安装ccache，开始构建"
              if make tools/ccache/compile -j$MAKE_THREAD; then
                echo "ccache 构建成功，本次编译将支持ccache"
                #make tools/install -j$MAKE_THREAD
                mkdir -p "$OPENWRT_PATH/.ccache"
                echo "ENABLED_CCACHE=true" >> $GITHUB_ENV
              else
                echo "ccache 构建失败，正在关闭ccache"
                sed -i 's/^CONFIG_CCACHE=y/# CONFIG_CCACHE is not set/' .config
                make defconfig
                echo "ENABLED_CCACHE=false" >> $GITHUB_ENV
              fi
            fi
          fi
        else
          echo "ENABLED_CCACHE=false" >> $GITHUB_ENV
        fi

    - name: Backup Cpolar Log to Artifact (备份 Cpolar log 到Artifact)
      uses: actions/upload-artifact@main
      with:
        name: cpolar-log.zip
        include-hidden-files: true
        path: /tmp/cpolar.log

    - name: Backup Config to Artifact (备份配置到Artifact)
      uses: actions/upload-artifact@main
      with:
        name: config-debug-${{ env.FIRMWARE_TAG }}.zip
        include-hidden-files: true
        path: ${{ env.OPENWRT_PATH }}/.config

    - name: Upload Custom Release Notes to Artifact (备份自定义发布信息到Artifact) 0
      if: always()
      uses: actions/upload-artifact@main
      with:
        name: custom_release_notes-${{ env.FIRMWARE_TAG }}.zip
        include-hidden-files: true
        path: |
          ${{ env.OPENWRT_PATH }}/custom_release_notes.txt

    - name: 空间使用情况（编译前）
      if: (!cancelled())
      run: df -hT

    - name: 记录开始编译前的存储占用
      run: |
        echo "DISK_USAGE_BEFORE_BUILD_HUMAN=$(df -h /workdir | tail -n 1 |  awk '{print $3}')" >> $GITHUB_ENV
        echo "DISK_USAGE_BEFORE_BUILD_ORIGIN=$(df /workdir | tail -n 1 |  awk '{print $3}')" >> $GITHUB_ENV

    - name: Compile Firmware (多线程尝试)
      id: compile
      if: ${{ env.FORCE_SINGLE_THREAD == 'false' }}
      continue-on-error: true # 允许此步失败，以便触发下方的重试逻辑
      run: |
        set -o pipefail
        cd $OPENWRT_PATH
        echo -e "$MAKE_THREAD thread compile"
        # 记录开始编译时的时间戳
        printf "TIMESTAMP_START_COMPILE=%(%s)T" >> $GITHUB_ENV
        echo >> $GITHUB_ENV
        if [ "$SHOW_DISK_FREE"x = "true"x ]; then
          while true; do
            date +"%Y-%m-%d %H:%M:%S" | tee -a /tmp/disk-usage.txt
            df -hT / | tail -1 | tee -a /tmp/disk-usage.txt
            sleep 10
          done &
        fi

        echo >> "$OPENWRT_PATH/build-log-color.log"
        echo "-------- Start building - $(date +"%Y-%m-%d %H:%M:%S") --------" >> "$OPENWRT_PATH/build-log-color.log"
        echo >> "$OPENWRT_PATH/build-log-color.log"

        # 第一次尝试：多线程编译
        unbuffer make -j"$MAKE_THREAD" V=s 2>&1 | tee -a "$OPENWRT_PATH/build-log-color.log" 2>&1

        echo >> "$OPENWRT_PATH/build-log-color.log"
        echo "-------- Stop building - $(date +"%Y-%m-%d %H:%M:%S") --------" >> "$OPENWRT_PATH/build-log-color.log"
        echo >> "$OPENWRT_PATH/build-log-color.log"

        echo "status=success" >> $GITHUB_OUTPUT
        echo "Changing CAN_UPLOAD to true" >> "$OPENWRT_PATH/build-log-color.log"
        #cat "$OPENWRT_PATH/build-log-color.log" | ansi2txt > /tmp/build-log-nocolor.log
        echo "CAN_UPLOAD=true" >> $GITHUB_ENV
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Compile Firmware Single Thread with Verbosity (单线程详细模式)
      id: compile_j1  
      if: ${{ env.FORCE_SINGLE_THREAD == 'true' }}
      continue-on-error: true
      run: |
        set -o pipefail
        cd $OPENWRT_PATH
        # 记录开始编译时的时间戳
        printf "TIMESTAMP_START_COMPILE=%(%s)T" >> $GITHUB_ENV
        echo >> $GITHUB_ENV
        if [ "$SHOW_DISK_FREE"x = "true"x ]; then
          while true; do df -hT /; sleep 10; done &
        fi

        echo >> "$OPENWRT_PATH/build-log-color.log"
        echo "-------- Start building - $(date +"%Y-%m-%d %H:%M:%S") --------" >> "$OPENWRT_PATH/build-log-color.log"
        echo >> "$OPENWRT_PATH/build-log-color.log"

        # 单线程编译，V=s 会打印所有错误输出
        echo "compile=true" >> $GITHUB_OUTPUT
        unbuffer make -j1 V=sc 2>&1 | tee -a "$OPENWRT_PATH/build-log-color.log" 2>&1

        echo >> "$OPENWRT_PATH/build-log-color.log"
        echo "-------- Stop building - $(date +"%Y-%m-%d %H:%M:%S") --------" >> "$OPENWRT_PATH/build-log-color.log"
        echo >> "$OPENWRT_PATH/build-log-color.log"

        echo "status=success" >> $GITHUB_OUTPUT
        echo "Changing CAN_UPLOAD to true" >> "$OPENWRT_PATH/build-log-color.log"
        #cat "$OPENWRT_PATH/build-log-color.log" | ansi2txt > /tmp/build-log-nocolor.log
        echo "CAN_UPLOAD=true" >> $GITHUB_ENV
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Log de-colorize (Log 去颜色)
      if: always()
      continue-on-error: true
      run: |
        cat "$OPENWRT_PATH/build-log-color.log" | ansi2txt > /tmp/build-log-nocolor.log

    - name: Upload Build Log, Disk Free Record, Custom Release Notes to Artifact (备份编译日志,存储剩余记录,自定义发布信息到Artifact) 1
      if: always()
      uses: actions/upload-artifact@main
      with:
        name: compile-log-and-custom_release_notes-${{ env.FIRMWARE_TAG }}-1.zip
        include-hidden-files: true
        path: |
          ${{ env.OPENWRT_PATH }}/build-log-color.log
          /tmp/build-log-nocolor.log
          /tmp/disk-usage.txt
          ${{ env.OPENWRT_PATH }}/custom_release_notes.txt

    # 智能检查是否编译成功，如果没有成功并运行了 Cpolar ，进入调试等待，根据用户操作确定最终是否成功
    - name: Check if Success and Wait (确认是否成功，等待)
      if: env.CPOLAR != 'none' && !cancelled()
      shell: bash
      run: |
        # 更新 env
        env > ~/current_env-2.txt

        # 显示当前 CAN_UPLOAD 值
        echo "当前的 CAN_UPLOAD: $CAN_UPLOAD"
        
        # 检查是否成功，已成功时直接跳过
        if [ "$CAN_UPLOAD"x = "true"x ]; then
          echo "CAN_UPLOAD=true ，判定为已经成功，跳过"
          exit 0
        elif cat ./bin/targets/*/*/sha256sum; then
          echo "获取到了 sha256sum 的值，判定为已经成功，跳过"
          exit 0
        fi

        # 设置结束时间戳（约 6 小时超时限制）
        # GitHub Actions 单个 Job 限制为 360 分钟 (21600秒)
        sudo timedatectl set-timezone "$TZ"
        MAX_RUNTIME=20800 # 留更长时间，保证后面打包不超时
        export TIMESTAMP_STOP=$(printf "%(%s)T")
        # printf "TIMESTAMP_STOP=$TIMESTAMP_STOP" >> $GITHUB_ENV
        FLAG_FILE="/tmp/keep-cpolar"
        SUCCESS_FILE="/tmp/make-force-success"

        echo "========================================================="
        echo "编译失败，用时 $(( TIMESTAMP_STOP - TIMESTAMP_START )) 秒"
        echo "远程调试保持中..."
        echo "希望判定失败的方法: 1. SSH输入 'rm $FLAG_FILE' | 2. 终止 cpolar 进程 | 3. 接近 Action 时间限制"
        echo "希望判定成功的方法: 1. SSH输入 'touch $SUCCESS_FILE'"
        echo "========================================================="

        # 创建标志文件（如果不存在）
        touch "$FLAG_FILE"
        
        while true; do
          CURRENT_TIME=$(date +%s)
          ELAPSED=$(( CURRENT_TIME - TIMESTAMP_START ))
          echo "当前消耗时间: ${ELAPSED}s"
          
          # 检查 1: 标志文件是否被删除
          if [ ! -f "$FLAG_FILE" ]; then
            echo "检测到 $FLAG_FILE 已被删除，正在退出..."
            echo "CAN_UPLOAD=false" >> $GITHUB_ENV
            break
          fi
          
          # 检查 2: cpolar 进程是否存在
          if ! pgrep cpolar > /dev/null; then
            echo "检测到 cpolar 进程已退出，正在结束任务..."
            echo "CAN_UPLOAD=false" >> $GITHUB_ENV
            break
          fi
          
          # 检查 3: 是否接近 6 小时运行上限
          if [ $ELAPSED -gt $MAX_RUNTIME ]; then
            echo "接近 Action 运行限时，正在自动退出..."
            echo "CAN_UPLOAD=false" >> $GITHUB_ENV
            break
          fi
          
          # 检查 4: 是否创建了成功文件
          if [ -f $SUCCESS_FILE ]; then
            echo "创建了成功文件，手动标记为成功"
            echo "CAN_UPLOAD=true" >> $GITHUB_ENV
            break
          fi
          
          # 每 10 秒检测一次，避免占用过多 CPU
          sleep 10
        done

    - name: 空间使用情况（编译占用）
      if: (!cancelled())
      run: df -hT

    - name: Upload Build Log, Disk Free Record, Custom Release Notes to Artifact (备份编译日志,存储剩余记录,自定义发布信息到Artifact) 2
      if: always()
      uses: actions/upload-artifact@main
      with:
        name: compile-log-and-custom_release_notes-${{ env.FIRMWARE_TAG }}-2.zip
        include-hidden-files: true
        path: |
          ${{ env.OPENWRT_PATH }}/build-log-color.log
          /tmp/build-log-nocolor.log
          /tmp/disk-usage.txt
          ${{ env.OPENWRT_PATH }}/custom_release_notes.txt

    - name: 上传 bin 目录
      uses: actions/upload-artifact@main
      if: (!cancelled()) && env.CAN_UPLOAD == 'true' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}.zip
        path: openwrt/bin

    - name: 记录编译完成后的存储占用
      run: |
        echo "DISK_USAGE_AFTER_BUILD_HUMAN=$(df -h /workdir | tail -n 1 |  awk '{print $3}')" >> $GITHUB_ENV
        echo "DISK_USAGE_AFTER_BUILD_ORIGIN=$(df /workdir | tail -n 1 |  awk '{print $3}')" >> $GITHUB_ENV

    - name: 整理文件
      id: organize
      if: env.CAN_UPLOAD == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        cat sha256sums
        
        echo "VERSION_KERNEL=$(find -type f -name "*.manifest" -exec grep -oP '^kernel - \K.*?(?=~|-\d+-)' {} \;)" >> $GITHUB_ENV
        cp $OPENWRT_PATH/.config build.config
        
        # 兼容 .ipk ，打开了 opkg 模式后仍然可以通过
        if ln -f $OPENWRT_PATH/bin/packages/*/*/*.apk packages; then
          echo "移动 *.apk 的软件包到打包目录 成功"
        else
          echo "移动 *.apk 的软件包到打包目录 失败，正在回退到 *.ipk"
          if ln -f $OPENWRT_PATH/bin/packages/*/*/*.ipk packages; then
            echo "移动 *.ipk 的软件包到打包目录 成功"
          else
            echo "移动 *.ipk 的软件包到打包目录 失败"
            exit 1
          fi
        fi

        cp "$OPENWRT_PATH/custom_release_notes.txt" ./
        tar -zcf Packages.tar.gz packages
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 记录整理文件后的存储占用
      run: |
        echo "DISK_USAGE_AFTER_ORGANIZE_HUMAN=$(df -h /workdir | tail -n 1 |  awk '{print $3}')" >> $GITHUB_ENV
        echo "DISK_USAGE_AFTER_ORGANIZE_ORIGIN=$(df /workdir | tail -n 1 |  awk '{print $3}')" >> $GITHUB_ENV

    - name: 上传固件目录
      uses: actions/upload-artifact@main
      if: env.UPLOAD_FIRMWARE == 'true' && steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && env.CAN_UPLOAD == 'true' && !cancelled()
      run: |
        echo "**This is OpenWrt Firmware for (x86_64)**" >> release.txt
        echo "### Builder信息" >> release.txt
        echo "- 🔗 源码版本: [${{ env.SHORT_COMMIT_BUILDER }}](${{ env.REPO_URL_BUILDER }}/commit/${{ env.COMMIT_HASH_BUILDER }})" >> release.txt
        echo "- 🚀 本次运行 Workflow: [#${{ github.run_number }} (${{ github.run_id }})](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> release.txt
        echo "- 🛠️ Workflow 定义文件: [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/.github/workflows/X86-64.yml)" >> release.txt
        echo "- ⚙️ Workflow 变量 / 动态名称: x86-64 ${{ env.CPOLAR }} ${{ env.CPOLAR_TOKEN_TYPE }} wujinjun|others|larger|busybox:${{ env.USE_WUJINJUN }}|${{ env.USE_OTHERS }}|${{ env.USE_LARGER }}|${{ env.USE_BUSYBOX }} single_thread:${{ env.FORCE_SINGLE_THREAD }} ccache:${{ env.USE_CCACHE }}" sccache:${{ env.USE_SCCACHE }}"
        echo "### 📒 固件信息(WIFI)" >> release.txt
        echo "- x86_64的固件" >> release.txt
        echo "- 💻 这是 (x86_64) 平台使用的 OpenWrt 固件" >> release.txt
        echo "- ⚽ 固件源码: ${{ env.REPO_URL }}" >> release.txt
        echo "- 💝 源码分支: ${{ env.REPO_BRANCH }}" >> release.txt
        echo "- 🔗 源码版本: [${{ env.SHORT_COMMIT }}](${{ env.REPO_URL }}/commit/${{ env.COMMIT_HASH }})" >> release.txt
        echo "- 🛠️ 编译模式: ${{ inputs.force_single_thread == 'true' && '单线程' || '多线程' }}" >> release.txt
        echo "- 🌐 默认地址: 192.168.8.1" >> release.txt
        echo "### 🧊 固件版本" >> release.txt
        echo "- 固件内核版本：${{ env.VERSION_KERNEL }}" >> release.txt
        echo "- 固件编译前最后一次➦[主源码](${{ env.REPO_URL }})更新记录:" >> release.txt
        echo "  - ${{ env.VERSION_INFO }}" >> release.txt
        echo "### 存储占用记录" >> release.txt
        echo "<details>" >> release.txt
        echo >> release.txt

        echo "<summary>点击展开</summary>" >> release.txt
        echo >> release.txt

        echo "所有步骤开始前: $DISK_USAGE_BEFORE_ALL_HUMAN ($DISK_USAGE_BEFORE_ALL_ORIGIN)" >> release.txt
        echo >> release.txt
        echo "编译开始前: $DISK_USAGE_BEFORE_BUILD_HUMAN ($DISK_USAGE_BEFORE_BUILD_ORIGIN)" >> release.txt
        echo >> release.txt
        echo "编译完成后: $DISK_USAGE_AFTER_BUILD_HUMAN ($DISK_USAGE_AFTER_BUILD_ORIGIN)" >> release.txt
        echo >> release.txt
        echo "整理文件后: $DISK_USAGE_AFTER_ORGANIZE_HUMAN ($DISK_USAGE_AFTER_ORGANIZE_ORIGIN)" >> release.txt
        echo >> release.txt

        echo "</details>" >> release.txt
        if [ -e "$OPENWRT_PATH/custom_release_notes.txt" ]; then
          custom_release_notes_length=$(cat "$OPENWRT_PATH/custom_release_notes.txt" | wc -c)
          if [ $custom_release_notes_length -gt 100 ]; then
            echo "### 自定义发布信息" >> release.txt
            echo "<details>" >> release.txt
            echo >> release.txt

            echo "<summary>点击展开</summary>" >> release.txt
            echo >> release.txt

            cat "$OPENWRT_PATH/custom_release_notes.txt" >> release.txt
            echo >> release.txt

            echo "</details>" >> release.txt
          else
            echo "### 自定义发布信息" >> release.txt
            echo >> release.txt
            cat "$OPENWRT_PATH/custom_release_notes.txt" >> release.txt
          fi
        fi
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到发布
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ env.FIRMWARE_TAG }} # 使
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Final disk usage 4
      if: always()
      run: |
        df -h

    - name: 检查缓存 (保存)
      id: check-cache-save
      uses: actions/cache/save@v5
      with:
        key: x86-${{env.REPO_BRANCH}}-${{env.WRT_HASH}}
        path: |
          ./openwrt/.ccache
          ./openwrt/.sccache
          ./openwrt/staging_dir/host*
          ./openwrt/staging_dir/tool*

    # 3. 编译完成后，如果是 debug 模式，等待一段时间避免立即关机
    - name: Wait for Remote Debug Exit
      if: env.CPOLAR != 'none' && !cancelled()
      shell: bash
      run: |
        # 防止编译报错后立即销毁虚拟机，给你留出上去排查日志的时间
        # echo "Cpolar is running, waiting for timeout or manual exit..."
        # # sudo timedatectl set-timezone ${{ env.TZ }}
        # printf "TIMESTAMP_AFTER_PACKAGING=%(%s)T" >> $GITHUB_ENV
        # echo >> $GITHUB_ENV
        # ( pgrep cpolar && [ $(( TIMESTAMP_AFTER_PACKAGING - TIMESTAMP_AFTER_COMPILE )) -lt 21500 ] ) || exit 0
        # sleep $(( 21550 - $(( TIMESTAMP_AFTER_PACKAGING - TIMESTAMP_AFTER_COMPILE )) ))
        
        # 设置结束时间戳（约 6 小时超时限制）
        # GitHub Actions 单个 Job 限制为 360 分钟 (21600秒)
        sudo timedatectl set-timezone "$TZ"
        MAX_RUNTIME=21500
        export TIMESTAMP_STOP=$(printf "%(%s)T")
        printf "TIMESTAMP_STOP=$TIMESTAMP_STOP" >> $GITHUB_ENV
        FLAG_FILE="/tmp/keep-cpolar"

        echo "========================================================="
        echo "所有运行已结束，用时 $(( TIMESTAMP_STOP - TIMESTAMP_START )) 秒"
        echo "远程调试保持中..."
        echo "退出方式: 1. SSH输入 'rm $FLAG_FILE' | 2. 终止 cpolar 进程 | 3. 接近 Action 时间限制"
        echo "========================================================="

        # 创建标志文件（如果不存在）
        touch "$FLAG_FILE"
        
        while true; do
          CURRENT_TIME=$(date +%s)
          ELAPSED=$(( CURRENT_TIME - TIMESTAMP_START ))
          echo "当前消耗时间: ${ELAPSED}s"
          
          # 检查 1: 标志文件是否被删除
          if [ ! -f "$FLAG_FILE" ]; then
            echo "检测到 $FLAG_FILE 已被删除，正在退出..."
            break
          fi
          
          # 检查 2: cpolar 进程是否存在
          if ! pgrep cpolar > /dev/null; then
            echo "检测到 cpolar 进程已退出，正在结束任务..."
            break
          fi
          
          # 检查 3: 是否接近 6 小时运行上限
          if [ $ELAPSED -gt $MAX_RUNTIME ]; then
            echo "接近 Action 运行限时，正在自动退出..."
            break
          fi
          
          # 每 10 秒检测一次，避免占用过多 CPU
          sleep 10
        done
